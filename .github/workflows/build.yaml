name: Build Add-on

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build:
    name: Build multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get add-on version
        id: version
        run: |
          version=$(grep '^version:' nyxid-node/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: nyxid-node
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            NYXID_VERSION=0.5.3
          tags: |
            ghcr.io/chronoaiproject/nyx-homeassistant-node:${{ steps.version.outputs.version }}
            ghcr.io/chronoaiproject/nyx-homeassistant-node:latest

    outputs:
      version: ${{ steps.version.outputs.version }}

  build-admin:
    name: Build admin variant
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get admin add-on version
        id: version
        run: |
          version=$(grep '^version:' nyxid-node-admin/config.yaml | awk '{print $2}' | tr -d '"')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push admin
        uses: docker/build-push-action@v6
        with:
          context: nyxid-node-admin
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_FROM=ghcr.io/chronoaiproject/nyx-homeassistant-node:${{ needs.build.outputs.version }}
          tags: |
            ghcr.io/chronoaiproject/nyx-homeassistant-node-admin:${{ steps.version.outputs.version }}
            ghcr.io/chronoaiproject/nyx-homeassistant-node-admin:latest
