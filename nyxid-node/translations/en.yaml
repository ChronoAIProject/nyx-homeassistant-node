configuration:
  nyxid_server_url:
    name: "NyxID Server URL"
    description: "WebSocket URL of your NyxID server"
  nyxid_api_key:
    name: "NyxID API Key"
    description: "Create with: nyxid api-key create --name ha-addon --scopes 'read write' --allow-all-nodes --allow-all-services"
  ha_service_label:
    name: "HA Service Label"
    description: "Display name for the NyxID service this add-on auto-provisions (default: Home Assistant). The add-on creates + binds the service on first start; the slug is shown in the startup log."
  node_name:
    name: "Node Name"
    description: "Display name for this node"
  log_level:
    name: "Log Level"
    description: "Logging verbosity"
  services:
    name: "Additional Services"
    description: "Extra LAN services to proxy (HA is auto-configured)"
    slug:
      name: "Service Slug"
      description: "Unique identifier (e.g., synology-nas)"
    target_url:
      name: "Target URL"
      description: "URL of the service (e.g., http://192.168.1.100:5000)"
    credential_type:
      name: "Credential Type"
      description: "Header or query parameter"
    credential_name:
      name: "Credential Name"
      description: "Header name or param name"
    credential_value:
      name: "Credential Value"
      description: "The secret value"
